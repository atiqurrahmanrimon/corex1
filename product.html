<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreX - Product Details</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            padding-top: 80px;
        }
        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }
        .product-gallery {
            position: sticky;
            top: 100px;
            height: fit-content;
        }
        .main-image-container {
            background-color: #111;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 500px;
        }
        .main-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.4s ease;
        }
        .thumbnail-gallery {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            background-color: #111;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border-color 0.3s;
        }
        .thumbnail.active {
            border-color: #2997ff;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .product-price {
            font-size: 1.8rem;
            font-weight: 500;
            color: #ccc;
            margin-bottom: 30px;
        }
        .product-desc {
            font-size: 1.1rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .product-specs {
            margin-bottom: 40px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }
        .spec-label {
            color: #888;
            font-weight: 500;
        }
        .spec-value {
            color: #fff;
            font-weight: 600;
            text-align: right;
        }
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        .btn-add {
            flex: 1;
            padding: 18px;
            background-color: transparent;
            color: #2997ff;
            border: 2px solid #2997ff;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .btn-add:hover {
            background-color: rgba(41, 151, 255, 0.1);
        }
        .btn-buy {
            flex: 1;
            padding: 18px;
            background-color: #2997ff;
            color: #fff;
            border: 2px solid #2997ff;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
            text-decoration: none;
        }
        .btn-buy:hover {
            background-color: #147ce6;
            border-color: #147ce6;
        }
        
        @media (max-width: 768px) {
            .product-container { 
                grid-template-columns: 1fr; 
                gap: 30px;
                padding-top: 20px;
            }
            .product-gallery { position: static; }
            .main-image-container { height: 350px; padding: 20px; }
            .product-info h1 { font-size: 2.2rem; }
            .action-buttons { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="CoreX" style="height: 35px; width: auto; display: block;"></a>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Back to Store</a></li>
            </ul>
        </div>
    </nav>

    <div class="product-container" id="productContainer" style="display: none;">
        <!-- Left: Gallery -->
        <div class="product-gallery">
            <div class="main-image-container">
                <img src="" id="mainImage" alt="Product">
            </div>
            <div class="thumbnail-gallery" id="thumbnailGallery">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Right: Info -->
        <div class="product-info">
            <h1 id="productTitle">Loading...</h1>
            <div class="product-price" id="productPrice">0 ৳</div>
            <p class="product-desc" id="productDesc"></p>
            
            <div class="product-specs" id="productSpecs">
                <h3>Technical Specifications</h3>
                <!-- Injected via JS -->
            </div>

            <div class="action-buttons">
                <button class="btn-add" id="btnAddCart">Add to Cart</button>
                <a href="#" class="btn-buy" id="btnBuyNow">Buy Now</a>
            </div>
        </div>
    </div>
    
    <div id="errorContainer" style="display: none; text-align: center; padding: 100px 20px;">
        <h2>Product Not Found</h2>
        <a href="index.html" style="color: #2997ff;">Return to Store</a>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content" style="flex-direction: column; gap: 20px;">
            <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <a href="https://www.facebook.com/corexgadgetbd" target="_blank" style="color: #888; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#2997ff'" onmouseout="this.style.color='#888'">Facebook</a>
                <a href="https://m.me/corexgadgetbd" target="_blank" style="color: #888; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#2997ff'" onmouseout="this.style.color='#888'">Messenger</a>
                <a href="https://www.instagram.com/corexgadgetbd/" target="_blank" style="color: #888; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#2997ff'" onmouseout="this.style.color='#888'">Instagram</a>
                <a href="https://wa.me/message/WZT3SOUAI46SD1" target="_blank" style="color: #888; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#2997ff'" onmouseout="this.style.color='#888'">WhatsApp</a>
                <a href="mailto:corexgadgetbd@gmail.com" style="color: #888; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#2997ff'" onmouseout="this.style.color='#888'">corexgadgetbd@gmail.com</a>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; border-top: 1px solid #333; padding-top: 20px; flex-wrap: wrap; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="assets/images/logo.png" alt="CoreX" style="height: 25px; width: auto; opacity: 0.8;">
                    <p style="margin: 0;">&copy; 2026 CoreX Inc. All rights reserved.</p>
                </div>
                <ul class="footer-links" style="margin: 0;">
                    <li><a href="privacy.html">Privacy Policy</a></li>
                    <li><a href="terms.html">Terms of Use</a></li>
                    <li><a href="sales.html">Sales Policy</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="assets/js/products.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const product = productDatabase[productId];

            if (!product) {
                document.getElementById('errorContainer').style.display = 'block';
                return;
            }

            document.getElementById('productContainer').style.display = 'grid';
            document.title = `CoreX - ${product.name}`;

            // Handle Recently Visited
            let recent = JSON.parse(localStorage.getItem('corex_recent')) || [];
            recent = recent.filter(id => id !== productId);
            recent.unshift(productId);
            if (recent.length > 4) recent.pop();
            localStorage.setItem('corex_recent', JSON.stringify(recent));

            // Populate Info
            document.getElementById('productTitle').textContent = product.name;
            document.getElementById('productPrice').textContent = `${product.price.toLocaleString()} ৳`;
            document.getElementById('productDesc').textContent = product.desc;

            // Populate Specs
            const specsContainer = document.getElementById('productSpecs');
            product.specs.forEach(spec => {
                specsContainer.innerHTML += `
                    <div class="spec-item">
                        <span class="spec-label">${spec.label}</span>
                        <span class="spec-value">${spec.value}</span>
                    </div>
                `;
            });

            // Set Main Image
            const mainImg = document.getElementById('mainImage');
            mainImg.src = product.img;
            if(product.variant) mainImg.classList.add(product.variant);

            // Populate Thumbnail Gallery
            const thumbContainer = document.getElementById('thumbnailGallery');
            const angles = [
                { transform: 'scale(1)', label: 'Front' },
                { transform: 'scale(1.2) rotate(5deg)', label: 'Angle' },
                { transform: 'scale(1.5) translate(-10%, 10%)', label: 'Detail' }
            ];

            angles.forEach((angle, index) => {
                const thumb = document.createElement('div');
                thumb.className = `thumbnail ${index === 0 ? 'active' : ''}`;
                thumb.innerHTML = `<img src="${product.img}" class="${product.variant}" style="transform: ${angle.transform};" alt="Angle ${index+1}">`;
                
                thumb.addEventListener('click', () => {
                    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    mainImg.style.transform = angle.transform;
                });
                
                thumbContainer.appendChild(thumb);
            });

            // Set up Buttons
            document.getElementById('btnAddCart').addEventListener('click', () => {
                cart.add(product.name, product.price, product.img, product.variant);
            });
            
            document.getElementById('btnBuyNow').href = `order.html?product=${encodeURIComponent(product.name)}&price=${product.price}&img=${encodeURIComponent(product.img)}&variant=${product.variant}`;
        });
    </script>
</body>
</html>
